site_name: Liber Developer Docs
docs_dir: docs
site_dir: site

theme:
  name: 'rtd-dropdown'

nav:
  - Home: index.md
  - API Reference: reference/

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../source
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
